<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto MIP - Manejo Integrado de Pragas</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* AVISO: Configuração da raiz do site. O tamanho padrão do navegador é 16px */
        :root {
            --verde-principal: #2d6a4f;
            --verde-claro: #d8f3dc;
            --verde-destaque: #52b788;
            --azul-claro: #e0f2fe;
            --azul-botao: #38bdf8;
            --azul-escuro: #0369a1;
            --texto-cor: #2d3748;
            --background: #f0fdf4;
        }

        /* REGRA GERAL: Reseta margens para evitar quebras de layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* IMPORTANTE: O efeito de transição foi movido para o HTML para suavizar o site todo */
        html {
            font-size: 16px; /* Começa com o padrão de 16px */
            transition: font-size 0.2s ease;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--background);
            color: var(--texto-cor);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        /* DESIGN: Configuração do cabeçalho */
        header {
            background: linear-gradient(135deg, var(--verde-principal), var(--verde-destaque));
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        header h1 {
            font-size: 2.5rem; /* Baseado no tamanho da raiz */
            margin-bottom: 10px;
            font-weight: 800;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* ALINHAMENTO: Força a barra de acessibilidade para a direita */
        .accessibility-bar {
            background-color: var(--azul-claro);
            padding: 10px 20px;
            text-align: right;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            align-items: center;
            border-bottom: 2px solid #bae6fd;
        }

        .accessibility-bar span {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--azul-escuro);
        }

        /* BOTÕES: Cursor em estilo pointer para indicar clique */
        .btn-acc {
            background-color: white;
            border: 2px solid var(--azul-botao);
            color: var(--azul-escuro);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s;
        }

        .btn-acc:hover {
            background-color: var(--azul-botao);
            color: white;
        }

        /* ESTRUTURA: Centraliza o conteúdo principal */
        main {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* ESTILO: Configuração dos cards brancos */
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(45, 106, 79, 0.05); 
            border: 1px solid var(--verde-claro);
        }

        h2 {
            color: var(--verde-principal);
            margin-bottom: 15px;
            font-size: 1.6rem;
            border-left: 5px solid var(--verde-destaque);
            padding-left: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        p {
            margin-bottom: 15px;
            font-size: 1.05rem;
            text-align: justify;
        }

        ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        li {
            margin-bottom: 12px;
            font-size: 1.05rem;
        }

        strong {
            color: var(--verde-principal);
        }

        /* GRID: Organiza os métodos */
        .metodos-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }

        .metodo-item {
            background-color: var(--azul-claro);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #bae6fd;
        }

        .metodo-item strong {
            color: var(--azul-escuro);
            display: block;
            margin-bottom: 5px;
        }

        /* CHATBOX: Moldura da área interativa */
        .chat-container {
            background-color: #fafafa;
            border: 2px dashed var(--azul-botao); 
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        /* JANELA DO CHAT */
        .chat-window {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* BALÕES DE MENSAGEM */
        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
        }

            background-color: var(--
